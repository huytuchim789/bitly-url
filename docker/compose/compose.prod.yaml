name: bitly

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitly
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: bitly-url-server
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/bitly?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      GIN_MODE: release
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: bitly-url-client
    environment:
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - server

  nginx:
    build:
      context: ../../
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
      - client

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db:5432/bitly?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../docker/prometheus:/etc/prometheus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ../../docker/promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ORG_ROLE=Admin
    volumes:
      - ../../docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ../../docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
